query CartInput {
  shop {
    localTime {
      date
    }
  }
  cart {
    buyerIdentity {
      customer {
        id
        membershipCredits: metafield(namespace: "custom", key: "membership_credits") {
          value
        }
        lastMembershipRenewal: metafield(namespace: "custom", key: "last_membership_renewal") {
          value
        }
      }
    }
    lines {
      id
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}